name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  meta:
    name: Repo metadata sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify governance files exist
        run: |
          set -euxo pipefail
          test -f LICENSE
          test -f NOTICE
          test -f README.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -d docs/adr

  js:
    name: TypeScript packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm biome ci .
      # Build runs before typecheck so downstream packages can resolve
      # `@poppy/server-ts` (whose `exports` point to dist/, only present
      # post-build). pnpm -r executes in topological order.
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test

  # Future jobs (conformance corpus across web/Android/iOS renderers) are
  # added as the corresponding packages land.
