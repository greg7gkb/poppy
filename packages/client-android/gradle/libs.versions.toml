[versions]
# Toolchain
agp = "8.7.3"
kotlin = "2.0.21"
ksp = "2.0.21-1.0.27"
java = "17"

# Android SDKs
compileSdk = "35"
minSdk = "24"
targetSdk = "35"

# Compose — BOM is the single source of truth for all Compose libs.
# 2024.12.01 ships Compose UI 1.7.6, Material3 1.3.1.
composeBom = "2024.12.01"
composeCompiler = "1.5.15"

# AndroidX (non-Compose)
androidxCore = "1.15.0"
androidxActivity = "1.9.3"

# JSON — kotlinx.serialization (per ADR-0009).
kotlinxSerialization = "1.7.3"

# Image loading — Coil (per docs/phase-2-plan.md §"Image loading abstraction").
coil = "2.7.0"

# Test deps
junit = "4.13.2"
robolectric = "4.14.1"
androidxTestExt = "1.2.1"
androidxTestRunner = "1.6.2"

[libraries]
# Compose BOM-managed libraries (no version specified — BOM resolves)
compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "composeBom" }
compose-ui = { group = "androidx.compose.ui", name = "ui" }
compose-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview" }
compose-ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling" }
compose-foundation = { group = "androidx.compose.foundation", name = "foundation" }
compose-material3 = { group = "androidx.compose.material3", name = "material3" }
compose-ui-test-junit4 = { group = "androidx.compose.ui", name = "ui-test-junit4" }
compose-ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" }

# AndroidX runtime
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "androidxCore" }
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "androidxActivity" }

# JSON
kotlinx-serialization-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "kotlinxSerialization" }

# Image loading
coil-compose = { group = "io.coil-kt", name = "coil-compose", version.ref = "coil" }

# Tests
junit = { group = "junit", name = "junit", version.ref = "junit" }
robolectric = { group = "org.robolectric", name = "robolectric", version.ref = "robolectric" }
androidx-test-ext-junit = { group = "androidx.test.ext", name = "junit", version.ref = "androidxTestExt" }
androidx-test-runner = { group = "androidx.test", name = "runner", version.ref = "androidxTestRunner" }

[plugins]
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
