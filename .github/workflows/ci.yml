name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  meta:
    name: Repo metadata sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify governance files exist
        run: |
          set -euxo pipefail
          test -f LICENSE
          test -f NOTICE
          test -f README.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -d docs/adr

  js:
    name: TypeScript packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm biome ci .
      # Build runs before typecheck so downstream packages can resolve
      # `@poppy/server-ts` (whose `exports` point to dist/, only present
      # post-build). pnpm -r executes in topological order.
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test

  android:
    name: Android Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          # Build's source/target compatibility is Java 17, but JDK 21 is
          # forward-compatible (compiles to a Java 17 target). Bumping the
          # runner JDK keeps the bytecode at 17 — consumers still need
          # only JDK 17+.
          java-version: '21'
      - uses: android-actions/setup-android@v4
        with:
          # Match compileSdk in packages/client-android/build.gradle.kts.
          packages: 'platforms;android-35 build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@v6
        with:
          # Use the OSS basic cache provider, not the proprietary one v5+
          # introduced. Aligns with ADR-0005 (minimize third-party deps).
          cache-provider: basic
      - name: Gradle check
        working-directory: packages/client-android
        run: ./gradlew check --stacktrace

  ios:
    name: iOS SwiftUI
    # macos-15 carries Xcode 16+ as its default; macos-14 only goes to Xcode 15.
    # macOS minutes burn more than Linux but are free for public repos.
    # Top-level triggers (pull_request to main, push to main) already restrict
    # this job from running on every feature-branch push.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      - name: Swift test
        working-directory: packages/client-ios
        # Package.swift declares both .iOS(.v16) and .macOS(.v13). `swift test`
        # runs the macOS target, which exercises the same source code SwiftUI
        # compiles for iOS. The actual iOS-Simulator build is verified by the
        # Xcode test runner separately if/when we wire it up.
        run: swift test
